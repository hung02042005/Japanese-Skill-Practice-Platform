# [CẢNH BÁO]: FILE NÀY LÀ LEGACY NẾU BẠN SỬ DỤNG KIẾN TRÚC CLOUD NATIVE.
# File này chỉ còn tác dụng nếu bạn vẫn muốn deploy lên một con VPS nguyên khối.
# Override dùng trên VPS production, sau khi đã trỏ DNS xong (Bước 1).
# Chạy cùng file gốc:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Thêm port 443 + mount chứng chỉ SSL (Let's Encrypt) và webroot dùng để
# certbot xác minh domain / gia hạn (không cần dừng Nginx khi renew).
#
# QUAN TRỌNG: ./certbot-www là bind-mount tới thư mục thật trên VPS host
# (không phải Docker named volume), vì certbot chạy trực tiếp trên host
# (--webroot -w /path/to/project/certbot-www) cần ghi vào đúng thư mục
# mà container frontend đang đọc.

services:
  frontend:
    # Nếu bạn cấu hình SSL ở Nginx (Full Strict Cloudflare), hãy bỏ comment các dòng dưới
    # ports:
    #   - "443:443"
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro
    #   - ./certbot-www:/var/www/certbot

  backend:
    environment:
      - DATABASE_URL=jdbc:mysql://db:3306/JLPT_LearningDB?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      - DATABASE_USERNAME=${MYSQL_USER:-jlpt}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - APP_FRONTEND_URL=https://sakuji.online
      # Bắt buộc cho Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-changeme_secret_key_needs_to_be_long_enough_for_hs256}
      # Bắt buộc để email xác minh / đặt lại mật khẩu hoạt động trên production
      # (root .env trên VPS nên khai báo đủ 4 biến này — xem apps/backend/.env.example).
      # QUAN TRỌNG: dùng "${VAR:-default}" chứ KHÔNG phải "${VAR}" trần — nếu root .env
      # chưa set, "${VAR}" substitute ra CHUỖI RỖNG (khác với "biến không tồn tại"),
      # và Spring bind spring.mail.port (kiểu int) với chuỗi rỗng sẽ crash ngay lúc khởi
      # động ứng dụng (BindException) → backend crash-loop → Nginx trả 502 cho mọi API.
      # Đây chính là lỗi thực tế đã xảy ra khi deploy commit ae85d7b6 — sửa bằng cách
      # giữ nguyên default giống hệt application.yml khi root .env chưa khai báo.
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
