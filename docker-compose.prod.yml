# Override dùng trên VPS production, sau khi đã trỏ DNS xong (Bước 1).
# Chạy cùng file gốc:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Thêm port 443 + mount chứng chỉ SSL (Let's Encrypt) và webroot dùng để
# certbot xác minh domain / gia hạn (không cần dừng Nginx khi renew).
#
# QUAN TRỌNG: ./certbot-www là bind-mount tới thư mục thật trên VPS host
# (không phải Docker named volume), vì certbot chạy trực tiếp trên host
# (--webroot -w /path/to/project/certbot-www) cần ghi vào đúng thư mục
# mà container frontend đang đọc.

services:
  frontend:
    # Nếu bạn cấu hình SSL ở Nginx (Full Strict Cloudflare), hãy bỏ comment các dòng dưới
    # ports:
    #   - "443:443"
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro
    #   - ./certbot-www:/var/www/certbot

  backend:
    environment:
      - DATABASE_URL=jdbc:sqlserver://db:1433;databaseName=JLPT_LearningDB;encrypt=true;trustServerCertificate=true
      - DATABASE_USERNAME=sa
      - DATABASE_PASSWORD=${MSSQL_SA_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - APP_FRONTEND_URL=https://sakuji.online
      # Bắt buộc cho Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
