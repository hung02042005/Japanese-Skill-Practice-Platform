# Môi trường STAGING (P1.4 — xem docs/05-Deployment/Deploy_Improvement_Plan.md).
#
# CHẠY ĐỘC LẬP với docker-compose.yml (không phải override/merge lên file gốc):
#   docker compose -f docker-compose.staging.yml up -d --build
#
# Lý do KHÔNG dùng override như docker-compose.prod.yml: Compose merge các file
# theo CÙNG TÊN SERVICE — nếu file này định nghĩa lại service "db"/"backend" với
# container_name khác, Compose sẽ MERGE thành 1 service duy nhất (union port,
# ghi đè container_name), không tạo ra 2 container riêng biệt như mong muốn. Vì
# vậy file này định nghĩa service KHÁC TÊN hoàn toàn (db-staging, backend-staging,
# ...) và image KHÁC REPOSITORY hoàn toàn (jlpt-backend-staging, không phải
# jlpt-backend:staging) — để không bao giờ bị vòng lặp dọn dẹp image theo SHA
# trong cd.yml (chỉ lọc theo đúng tên repo jlpt-backend/jlpt-frontend) đụng vào.
#
# Mục đích: mọi thay đổi schema DB / biến môi trường mới được test ở đây trước
# khi chạm production — cả 4 sự cố ngày 11/07/2026 lẽ ra bắt được ở bước này.
# Quy trình: push nhánh "develop" → cd-staging.yml tự deploy vào đây → test tay
# → merge "develop" vào "branch_for_hung" → cd.yml mới thực sự lên production.
#
# Chấp nhận đánh đổi: chạy CHUNG VPS với production (không phải máy vật lý
# riêng) để chi phí bằng 0 khi mới bắt đầu — rủi ro "staging ăn tài nguyên của
# production" tồn tại thật, chấp nhận có chủ đích cho tới khi ngân sách cho
# phép tách VPS riêng (xem "Tại sao thiết kế vậy" trong Deploy_Diagram.md).

version: '3.8'

services:
  db-staging:
    image: mysql:8.4
    container_name: jlpt-db-staging
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    environment:
      TZ: "UTC"
      # Dùng chung giá trị MYSQL_ROOT_PASSWORD/MYSQL_PASSWORD với production
      # (cùng .env) — đây là 1 container/volume hoàn toàn tách biệt, không có
      # dữ liệu chung với "db" production, nên dùng chung mật khẩu admin không
      # phát sinh rủi ro rò rỉ dữ liệu, chỉ đơn giản để không phải quản lý thêm
      # 1 secret.
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"
      MYSQL_DATABASE: "JLPT_LearningDB_staging"
      MYSQL_USER: "${MYSQL_USER:-jlpt}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}"
    ports:
      # Cổng ngoài khác hẳn production (13306) — tránh đụng cổng khi chạy chung VPS.
      - "13307:3306"
    volumes:
      - mysql_data_staging:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis-staging:
    image: redis:alpine
    container_name: jlpt-redis-staging
    ports:
      - "127.0.0.1:6380:6379"
    restart: unless-stopped

  # Tên service PHẢI là "backend" (không phải "backend-staging"): nginx.conf của
  # frontend được build cứng `proxy_pass http://backend:8080/...` (baked vào
  # image lúc build, không đổi được lúc chạy) — Compose phân giải DNS nội bộ
  # theo TÊN SERVICE, nên chỉ cần đổi container_name là không đủ. Không lo va
  # chạm với service "backend" của docker-compose.yml gốc: 2 file này chạy như
  # 2 project Compose HOÀN TOÀN riêng biệt (không dùng chung -f), nên trùng tên
  # service giữa 2 file không hề merge/đụng nhau — chỉ đụng nếu dùng chung -f.
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    image: jlpt-backend-staging:latest
    container_name: jlpt-backend-staging
    environment:
      - DATABASE_URL=jdbc:mysql://db-staging:3306/JLPT_LearningDB_staging?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      - DATABASE_USERNAME=${MYSQL_USER:-jlpt}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis-staging
      # Chưa có subdomain staging.sakuji.online (chưa cấu hình DNS/Cloudflare) —
      # dùng thẳng IP:port VPS cho tới khi cần test cả luồng OAuth2/email thật.
      - APP_FRONTEND_URL=${STAGING_FRONTEND_URL:-http://135.149.56.179:8082}
      - APP_CORS_ALLOWED_ORIGINS=${STAGING_FRONTEND_URL:-http://135.149.56.179:8082}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-changeme_secret_key_needs_to_be_long_enough_for_hs256}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - jlpt-uploads-staging:/app/uploads
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      redis-staging:
        condition: service_started
      db-staging:
        condition: service_healthy

  frontend-staging:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    image: jlpt-frontend-staging:latest
    container_name: jlpt-frontend-staging
    ports:
      - "8082:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jlpt-uploads-staging:
    name: jlpt-uploads-staging
  mysql_data_staging:
    name: mysql_data_staging
