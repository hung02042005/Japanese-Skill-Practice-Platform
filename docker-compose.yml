version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jlpt-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: jlpt-redis
    ports:
      # Chỉ bind 127.0.0.1: Redis không có password, không được public
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    # Tên image cố định (thay vì để Compose tự đặt theo tên thư mục project) — cần
    # thiết để cd.yml gắn thêm tag theo commit SHA (P1.5) và rollback.yml có thể
    # `docker tag` lại đúng image này khi quay về bản cũ.
    image: jlpt-backend:latest
    container_name: jlpt-backend
    env_file:
      - path: ./apps/backend/.env
        required: false
    environment:
      - UPLOAD_DIR=/app/uploads
    volumes:
      - jlpt-uploads:/app/uploads
    restart: unless-stopped
    ports:
      # Chỉ bind 127.0.0.1: mọi traffic public phải đi qua Nginx (frontend), không expose Spring Boot trực tiếp
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    image: jlpt-frontend:latest
    container_name: jlpt-frontend
    ports:
      - "80:80" # Expose frontend ra cổng 80 (HTTP mặc định)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jlpt-uploads:
    name: jlpt-uploads
  sqlserver_data:
    name: sqlserver_data
