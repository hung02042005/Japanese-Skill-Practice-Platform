version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jlpt-backend
    env_file:
      - ./apps/backend/.env
    environment:
      - UPLOAD_DIR=/app/uploads
    volumes:
      - jlpt-uploads:/app/uploads
    restart: unless-stopped
    ports:
      - "8080:8080" # Cho phép truy cập backend trực tiếp nếu cần thiết trong lúc dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: jlpt-frontend
    ports:
      - "80:80" # Expose frontend ra cổng 80 (HTTP mặc định)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jlpt-uploads:
    name: jlpt-uploads
