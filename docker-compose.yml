version: '3.8'

services:
  db:
    # 8.4 (LTS) — bắt buộc >= 8.0.16 vì schema dùng CHECK constraint rất nhiều;
    # MySQL cũ hơn parse CHECK rồi bỏ qua im lặng, không thực thi.
    image: mysql:8.4
    container_name: jlpt-db
    # utf8mb4: bắt buộc cho kanji/kana + emoji — không dựa vào default của image.
    # default-time-zone=+00:00: giữ CURRENT_TIMESTAMP = UTC, đúng ngữ nghĩa
    # SYSUTCDATETIME() của bản SQL Server cũ (xem MYSQL_MIGRATION_PLAN.md QĐ-2).
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    environment:
      TZ: "UTC"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"
      # MYSQL_DATABASE tự tạo database lúc container init -> không cần bước
      # "chờ rồi CREATE DATABASE" thủ công như bản SQL Server (xem cd.yml).
      MYSQL_DATABASE: "JLPT_LearningDB"
      MYSQL_USER: "${MYSQL_USER:-jlpt}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}"
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: jlpt-redis
    ports:
      # Chỉ bind 127.0.0.1: Redis không có password, không được public
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    # Tên image cố định (thay vì để Compose tự đặt theo tên thư mục project) — cần
    # thiết để cd.yml gắn thêm tag theo commit SHA (P1.5) và rollback.yml có thể
    # `docker tag` lại đúng image này khi quay về bản cũ.
    image: jlpt-backend:latest
    container_name: jlpt-backend
    env_file:
      - path: ./apps/backend/.env
        required: false
    environment:
      # DATABASE_* khai báo ở đây (environment thắng env_file) để "docker compose
      # up" luôn dùng đúng service "db" bên trên — chính là DB mà depends_on đang
      # chờ healthy. Trước đây khối này không có, nên nếu apps/backend/.env có
      # DATABASE_URL thì giá trị đó lặng lẽ thắng và backend local đi thẳng tới
      # DB ngoài, còn container "db" chạy không ai dùng.
      - DATABASE_URL=jdbc:mysql://db:3306/JLPT_LearningDB?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      - DATABASE_USERNAME=${MYSQL_USER:-jlpt}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - jlpt-uploads:/app/uploads
    restart: unless-stopped
    ports:
      # Chỉ bind 127.0.0.1: mọi traffic public phải đi qua Nginx (frontend), không expose Spring Boot trực tiếp
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_started
      # service_healthy (không phải service_started): lần đầu chạy, MySQL cần
      # ~20-30s để init database trước khi nhận connection. Nếu backend khởi
      # động sớm hơn, Flyway sẽ fail ngay lúc connect.
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        # Cùng giá trị GOOGLE_CLIENT_ID dùng cho backend (dòng "GOOGLE_CLIENT_ID"
        # ở docker-compose.prod.yml) — Client ID là định danh công khai, không
        # phải secret, nên dùng chung 1 biến .env cho cả build FE và env BE.
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    image: jlpt-frontend:latest
    container_name: jlpt-frontend
    ports:
      - "80:80" # Expose frontend ra cổng 80 (HTTP mặc định)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jlpt-uploads:
    name: jlpt-uploads
  mysql_data:
    name: mysql_data
