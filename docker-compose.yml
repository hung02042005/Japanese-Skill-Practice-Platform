version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jlpt-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"IF NOT EXISTS(SELECT * FROM sys.databases WHERE name='JLPT_LearningDB') CREATE DATABASE JLPT_LearningDB\" && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: jlpt-redis
    ports:
      # Chỉ bind 127.0.0.1: Redis không có password, không được public
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jlpt-backend
    env_file:
      - path: ./apps/backend/.env
        required: false
    environment:
      - UPLOAD_DIR=/app/uploads
    volumes:
      - jlpt-uploads:/app/uploads
    restart: unless-stopped
    ports:
      # Chỉ bind 127.0.0.1: mọi traffic public phải đi qua Nginx (frontend), không expose Spring Boot trực tiếp
      - "127.0.0.1:8080:8080"
    # BUG-06 REVERT (2026-07-11): đã thử "db: condition: service_healthy" nhưng
    # CD run thật fail với "dependency failed to start: container jlpt-db is
    # unhealthy" — healthcheck của db (định nghĩa sẵn, xem service `db` bên dưới)
    # tồn tại từ trước nhưng KHÔNG có ai từng verify nó pass thật trên VPS (trước
    # đây không service nào phụ thuộc vào nó). Hạ về service_started để deploy
    # chạy được ngay; vẫn tốt hơn tình trạng gốc (trước đây backend không chờ gì
    # cả). TODO: SSH vào VPS chạy
    #   docker inspect jlpt-db --format='{{json .State.Health}}'
    # để tìm lý do healthcheck fail thật (sai path sqlcmd/mssql-tools18, sai mật
    # khẩu SA so với container đang chạy, hay timeout quá ngắn), sửa healthcheck,
    # xác nhận 1 lần deploy chạy được với service_healthy rồi mới bật lại.
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: jlpt-frontend
    ports:
      - "80:80" # Expose frontend ra cổng 80 (HTTP mặc định)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jlpt-uploads:
    name: jlpt-uploads
  sqlserver_data:
    name: sqlserver_data
