<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- Background blob -->
  <ellipse cx="140" cy="105" rx="115" ry="85" fill="#FFE8EC" opacity="0.6"/>

  <!-- Speech bubble 1 (pink, large, center-left) -->
  <rect x="20" y="38" width="118" height="52" rx="14" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="1.5"/>
  <path d="M42 90 L32 106 L58 90" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="79" y="70" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="18" font-weight="700" fill="#E8637A">こんにちは</text>

  <!-- Speech bubble 2 (green, medium, right) -->
  <rect x="148" y="20" width="110" height="46" rx="12" fill="#F1F8E9" stroke="#A5D6A7" stroke-width="1.5"/>
  <path d="M248 66 L262 80 L238 66" fill="#F1F8E9" stroke="#A5D6A7" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="203" y="50" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="16" font-weight="700" fill="#2E7D32">ありがとう</text>

  <!-- Speech bubble 3 (gold, small, top-left tilted) -->
  <rect x="30" y="108" width="96" height="40" rx="10" fill="#FFFDE7" stroke="#F5C842" stroke-width="1.5" transform="rotate(-4 78 128)"/>
  <text x="78" y="133" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="15" font-weight="700" fill="#E65100" transform="rotate(-4 78 133)">おいしい！</text>

  <!-- Speech bubble 4 (light purple, behind) -->
  <rect x="152" y="90" width="102" height="38" rx="10" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1.5"/>
  <path d="M162 90 L152 76 L176 90" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="203" y="113" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="13" font-weight="700" fill="#6A1B9A">すみません</text>

  <!-- Saku-chan tiny peeking from behind bubble 1 -->
  <circle cx="22" cy="100" r="12" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="1"/>
  <ellipse cx="16" cy="91" rx="6" ry="9" fill="#E8637A" transform="rotate(-20 16 91)"/>
  <ellipse cx="22" cy="88" rx="6" ry="10" fill="#E8637A"/>
  <ellipse cx="28" cy="91" rx="6" ry="9" fill="#E8637A" transform="rotate(20 28 91)"/>
  <circle cx="19" cy="100" r="2.5" fill="#2D2D2D"/>
  <circle cx="25" cy="100" r="2.5" fill="#2D2D2D"/>
  <ellipse cx="16" cy="104" rx="5" ry="3" fill="#E8637A" opacity="0.25"/>
  <ellipse cx="28" cy="104" rx="5" ry="3" fill="#E8637A" opacity="0.25"/>

  <!-- Sparkle stars -->
  <path d="M132 18 L133.5 14 L135 18 L139 19.5 L135 21 L133.5 25 L132 21 L128 19.5Z" fill="#F5C842"/>
  <path d="M244 112 L245.5 108 L247 112 L251 113.5 L247 115 L245.5 119 L244 115 L240 113.5Z" fill="#F5C842" opacity="0.8"/>
  <path d="M60 18 L61 15 L62 18 L65 19 L62 20 L61 23 L60 20 L57 19Z" fill="#F5C842" opacity="0.7"/>
</svg>
