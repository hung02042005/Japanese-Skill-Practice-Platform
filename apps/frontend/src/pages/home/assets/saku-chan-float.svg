<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="222" rx="48" ry="6" fill="#F4A7B3" opacity="0.2"/>

  <!-- Body (seated/round) -->
  <ellipse cx="100" cy="160" rx="58" ry="52" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="2"/>

  <!-- Head -->
  <circle cx="100" cy="110" r="55" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="2"/>

  <!-- Crown petal left -->
  <ellipse cx="72" cy="56" rx="16" ry="26" fill="#E8637A" transform="rotate(-25 72 56)"/>
  <!-- Crown petal center -->
  <ellipse cx="100" cy="47" rx="16" ry="28" fill="#E8637A"/>
  <!-- Crown petal right -->
  <ellipse cx="128" cy="56" rx="16" ry="26" fill="#E8637A" transform="rotate(25 128 56)"/>
  <circle cx="100" cy="63" r="9" fill="#F4A7B3"/>
  <circle cx="100" cy="63" r="5" fill="#FFF0F3"/>

  <!-- Cheeks -->
  <ellipse cx="68" cy="122" rx="16" ry="10" fill="#E8637A" opacity="0.22"/>
  <ellipse cx="132" cy="122" rx="16" ry="10" fill="#E8637A" opacity="0.22"/>

  <!-- Eyes closed (peaceful) -->
  <path d="M84 110 Q92 118 100 110" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M100 110 Q108 118 116 110" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Peaceful smile -->
  <path d="M87 132 Q100 142 113 132" stroke="#E8637A" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Arms folded in lap -->
  <ellipse cx="68" cy="168" rx="24" ry="14" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="1.5" transform="rotate(18 68 168)"/>
  <ellipse cx="132" cy="168" rx="24" ry="14" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="1.5" transform="rotate(-18 132 168)"/>

  <!-- Sparkle stars -->
  <path d="M20 82 L22 76 L24 82 L30 84 L24 86 L22 92 L20 86 L14 84Z" fill="#F5C842" opacity="0.85"/>
  <path d="M168 62 L170 57 L172 62 L177 64 L172 66 L170 71 L168 66 L163 64Z" fill="#F5C842" opacity="0.75"/>
  <path d="M28 148 L29.5 144 L31 148 L35 149.5 L31 151 L29.5 155 L28 151 L24 149.5Z" fill="#F5C842" opacity="0.65"/>
  <path d="M162 148 L163.5 144 L165 148 L169 149.5 L165 151 L163.5 155 L162 151 L158 149.5Z" fill="#F5C842" opacity="0.70"/>

  <!-- Small petal decorations -->
  <ellipse cx="15" cy="115" rx="8" ry="5" fill="#F4A7B3" opacity="0.4" transform="rotate(-30 15 115)"/>
  <ellipse cx="182" cy="108" rx="8" ry="5" fill="#F4A7B3" opacity="0.4" transform="rotate(30 182 108)"/>
