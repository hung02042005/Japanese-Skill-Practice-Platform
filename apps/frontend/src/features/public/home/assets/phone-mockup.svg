<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 440" fill="none">
  <!-- Phone frame -->
  <rect x="10" y="8" width="200" height="424" rx="30" fill="#2D2D2D" filter="url(#phoneShadow)"/>
  <defs>
    <filter id="phoneShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Phone screen -->
  <rect x="18" y="22" width="184" height="396" rx="22" fill="white"/>

  <!-- Status bar -->
  <rect x="18" y="22" width="184" height="32" rx="22" fill="#FAF7F4"/>
  <rect x="18" y="40" width="184" height="14" fill="#FAF7F4"/>

  <!-- Camera notch -->
  <rect x="82" y="28" width="56" height="16" rx="8" fill="#2D2D2D"/>

  <!-- App header -->
  <rect x="18" y="54" width="184" height="44" fill="white"/>
  <text x="110" y="80" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="600" fill="#2D2D2D">Flashcard N3</text>

  <!-- Progress bar track -->
  <rect x="28" y="92" width="164" height="6" rx="3" fill="#E8E0DC"/>
  <!-- Progress bar fill (60%) -->
  <rect x="28" y="92" width="98" height="6" rx="3" fill="#E8637A"/>

  <!-- Progress label -->
  <text x="28" y="112" font-family="Nunito, sans-serif" font-size="10" fill="#757575">12 / 20 thẻ</text>
  <text x="192" y="112" text-anchor="end" font-family="Nunito, sans-serif" font-size="10" fill="#E8637A" font-weight="600">60%</text>

  <!-- Main flashcard -->
  <rect x="24" y="120" width="172" height="190" rx="16" fill="white" stroke="#E8E0DC" stroke-width="1.5" filter="url(#cardShadow)"/>
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Card label -->
  <rect x="82" y="130" width="56" height="18" rx="9" fill="#FFF0F3"/>
  <text x="110" y="143" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" font-weight="700" fill="#E8637A">N3 · Động vật</text>

  <!-- Furigana -->
  <text x="110" y="185" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="11" fill="#757575">ねこ</text>
  <!-- Main kanji -->
  <text x="110" y="235" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="64" font-weight="700" fill="#2D2D2D">猫</text>

  <!-- Card divider -->
  <line x1="44" y1="268" x2="176" y2="268" stroke="#E8E0DC" stroke-width="1"/>

  <!-- Meaning hint -->
  <text x="110" y="295" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#BDBDBD">Nhấn để xem nghĩa</text>

  <!-- Action buttons -->
  <!-- "Ôn lại" button (pink/left) -->
  <rect x="26" y="322" width="76" height="36" rx="18" fill="white" stroke="#E8637A" stroke-width="1.5"/>
  <text x="64" y="344" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" font-weight="700" fill="#E8637A">✗ Ôn lại</text>

  <!-- "Đã nhớ" button (green/right) -->
  <rect x="118" y="322" width="76" height="36" rx="18" fill="#4CAF50"/>
  <text x="156" y="344" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" font-weight="700" fill="white">✓ Đã nhớ</text>

  <!-- Bottom navigation dots -->
  <circle cx="96" cy="400" r="5" fill="#E8637A"/>
  <circle cx="110" cy="400" r="4" fill="#E8E0DC"/>
  <circle cx="124" cy="400" r="4" fill="#E8E0DC"/>

  <!-- Home indicator -->
  <rect x="80" y="412" width="60" height="4" rx="2" fill="#2D2D2D" opacity="0.15"/>
</svg>
