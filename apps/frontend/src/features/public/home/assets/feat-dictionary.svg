<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- Background shape -->
  <rect x="20" y="20" width="240" height="160" rx="24" fill="#FFE4EE" opacity="0.55"/>

  <!-- Book body (open) -->
  <!-- Left page -->
  <rect x="48" y="36" width="84" height="112" rx="4" fill="white" stroke="#E8E0DC" stroke-width="1"/>
  <!-- Right page -->
  <rect x="132" y="36" width="84" height="112" rx="4" fill="white" stroke="#E8E0DC" stroke-width="1"/>

  <!-- Book spine (3D effect) -->
  <rect x="128" y="36" width="8" height="112" fill="#C44E62"/>
  <!-- Book cover color (left outside) -->
  <rect x="44" y="36" width="8" height="112" rx="2" fill="#E8637A"/>

  <!-- Page lines (left page) -->
  <line x1="58" y1="60" x2="124" y2="60" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="58" y1="72" x2="124" y2="72" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="58" y1="84" x2="110" y2="84" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="58" y1="96" x2="120" y2="96" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="58" y1="108" x2="106" y2="108" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="58" y1="120" x2="118" y2="120" stroke="#E8E0DC" stroke-width="1"/>

  <!-- Right page content: 桜 highlight -->
  <rect x="138" y="52" width="72" height="44" rx="6" fill="#FFFDE7" stroke="#F5C842" stroke-width="1.5"/>
  <!-- Furigana: さくら -->
  <text x="174" y="68" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="10" fill="#757575">さくら</text>
  <!-- Main kanji: 桜 -->
  <text x="174" y="88" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="700" fill="#2D2D2D">桜</text>
  <!-- Ribbon bookmark -->
  <rect x="194" y="36" width="8" height="30" fill="#F5C842"/>
  <path d="M194 66 L198 72 L202 66" fill="#F5C842"/>

  <!-- Page lines right (below highlight) -->
  <line x1="140" y1="105" x2="206" y2="105" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="140" y1="115" x2="198" y2="115" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="140" y1="125" x2="202" y2="125" stroke="#E8E0DC" stroke-width="1"/>
  <line x1="140" y1="135" x2="196" y2="135" stroke="#E8E0DC" stroke-width="1"/>

  <!-- Magnifying glass -->
  <!-- Handle -->
  <rect x="185" y="128" width="8" height="40" rx="4" fill="#F5C842" transform="rotate(40 189 148)"/>
  <!-- Glass circle -->
  <circle cx="172" cy="112" r="32" fill="white" fill-opacity="0.7" stroke="#E8637A" stroke-width="2.5"/>
  <!-- Inner highlight -->
  <circle cx="172" cy="112" r="24" fill="#FFF0F3" opacity="0.5"/>
  <!-- 桜 zoomed inside glass -->
  <text x="172" y="124" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="30" font-weight="700" fill="#E8637A">桜</text>

  <!-- Floating small kanji around -->
  <text x="38" y="58" font-family="Noto Sans JP, sans-serif" font-size="16" fill="#E8637A" opacity="0.25">愛</text>
  <text x="226" y="44" font-family="Noto Sans JP, sans-serif" font-size="14" fill="#E8637A" opacity="0.2">美</text>
  <text x="34" y="148" font-family="Noto Sans JP, sans-serif" font-size="13" fill="#E8637A" opacity="0.22">心</text>

  <!-- Saku-chan tiny (holding magnifying glass, curious) -->
  <circle cx="215" cy="158" r="9" fill="#FFF0F3" stroke="#F4A7B3" stroke-width="0.8"/>
  <ellipse cx="212" cy="150" rx="5" ry="8" fill="#E8637A" transform="rotate(-20 212 150)"/>
  <ellipse cx="215" cy="149" rx="5" ry="9" fill="#E8637A"/>
  <ellipse cx="218" cy="150" rx="5" ry="8" fill="#E8637A" transform="rotate(20 218 150)"/>
  <circle cx="213" cy="158" r="1.8" fill="#2D2D2D"/>
  <circle cx="217" cy="158" r="1.8" fill="#2D2D2D"/>
  <ellipse cx="211" cy="161" rx="4" ry="2.5" fill="#E8637A" opacity="0.25"/>
  <ellipse cx="219" cy="161" rx="4" ry="2.5" fill="#E8637A" opacity="0.25"/>
</svg>
