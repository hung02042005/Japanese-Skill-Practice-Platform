# Rate limit cho endpoint auth — chống brute-force / credential stuffing.
# Khai báo top-level vì file này được include trong http{} của nginx chính.
limit_req_zone $binary_remote_addr zone=authlimit:10m rate=5r/s;

server {
    listen 80;
    server_name localhost;

    # ---- Security Headers ----
    # An toàn để bật dù origin chỉ chạy HTTP sau Cloudflare — header này áp
    # dụng cho response mà trình duyệt nhận (qua HTTPS ở edge Cloudflare),
    # không phụ thuộc scheme của chặng Cloudflare -> origin.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com; frame-src 'self' https://accounts.google.com; frame-ancestors 'self'" always;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Proxy AUTH requests to backend — rate-limited riêng, chống brute-force.
    location /api/auth/ {
        limit_req zone=authlimit burst=10 nodelay;

        proxy_pass http://backend:8080/api/auth/;
        proxy_set_header Host $host;
        # Cloudflare gửi IP thật qua header này
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare gửi HTTPS scheme qua header này, giữ nguyên để Backend Google OAuth2 hoạt động đúng
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        # Cloudflare gửi IP thật qua header này
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare gửi HTTPS scheme qua header này, giữ nguyên để Backend Google OAuth2 hoạt động đúng
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Serve uploads from backend directly
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # P2.8 — endpoint sức khoẻ CÔNG KHAI cho uptime monitoring (xem
    # docs/05-Deployment/Deploy_Improvement_Plan.md). Chỉ expose đúng 1 path
    # /health -> backend /actuator/health (không mở cả namespace /actuator/*),
    # vì management.endpoints.web.exposure.include=health trong application.yml
    # chỉ bật riêng health, và show-details=never nên response chỉ trả
    # {"status":"UP"|"DOWN"}, không rò rỉ chi tiết cấu hình nội bộ.
    location = /health {
        proxy_pass http://backend:8080/actuator/health;
        proxy_set_header Host $host;
    }
}
