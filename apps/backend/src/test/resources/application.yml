spring:
  application:
    name: jlpt-backend

  datasource:
    # H2 MODE=MySQL chỉ GIẢ LẬP MySQL — nó không tái hiện được hành vi utf8mb4,
    # CHECK constraint, INSERT IGNORE hay timezone của MySQL thật, nên test xanh
    # ở đây không chứng minh migration chạy được trên production. Việc xác minh
    # thật nằm ở "docker compose up trên volume trống" (xem MYSQL_MIGRATION_PLAN.md
    # mục 4). Cân nhắc chuyển sang Testcontainers MySQL — mục 6.2 của plan.
    url: jdbc:h2:mem:jlptdb_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 123

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: test-placeholder@example.com
    password: fake fake fake fake
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  frontend-url: http://localhost:3000

google:
  client-id: ${GOOGLE_CLIENT_ID:placeholder-replace-with-real-client-id}

logging:
  level:
    "[com.jlpt]": INFO
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": WARN
