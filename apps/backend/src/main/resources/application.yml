    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:jlptelearningplatform@gmail.com}
    password: ${SMTP_PASSWORD:tqap zdsq fsdj afyu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

