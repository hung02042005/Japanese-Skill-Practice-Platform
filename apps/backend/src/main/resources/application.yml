spring:
  application:
    name: jlpt-backend

  servlet:
    multipart:
      # Audio ghi âm speaking + ảnh avatar upload. Mặc định Spring chỉ 1MB/file → phải nâng.
      max-file-size: 10MB
      max-request-size: 12MB

  datasource:
    # serverTimezone=UTC: container MySQL chạy --default-time-zone=+00:00, khai
    # báo ở đây để driver không tự suy diễn timezone của JVM. Giữ đúng ngữ nghĩa
    # UTC mà SYSUTCDATETIME() của bản SQL Server cũ đảm bảo.
    url: ${DATABASE_URL:jdbc:mysql://127.0.0.1:3306/JLPT_LearningDB?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 12345


  jpa:
    hibernate:
      # validate (không phải update): Flyway là nguồn sự thật duy nhất cho schema
      # (ADR-004/ADR-006). Trên MySQL, ddl-auto=update sẽ tự tạo bảng/cột thiếu
      # với charset mặc định của server — nếu server không phải utf8mb4 thì kanji
      # bị ghi thành '?' mà không có lỗi nào. validate chặn hẳn khả năng đó và
      # phát hiện sớm sai lệch giữa entity và migration.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  h2:
    console:
      enabled: false

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

# OpenAPI/Swagger — bật mặc định cho dev/staging, có thể tắt ở prod qua env var
# SPRINGDOC_ENABLED=false nếu không muốn công khai tài liệu API.
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    # SMTP chưa cấu hình thật ở nhiều môi trường (username/password rỗng) khiến
    # MailHealthIndicator tự động của Spring Boot báo DOWN — kéo cả status tổng
    # của /actuator/health xuống DOWN dù ứng dụng vẫn phục vụ request bình
    # thường. Tắt riêng health indicator này để /actuator/health chỉ phản ánh
    # đúng các phụ thuộc thực sự bắt buộc (DB, disk) — dùng làm điều kiện
    # post-deploy smoke test trong cd.yml (xem Deploy_Improvement_Plan.md P0.1).
    mail:
      enabled: false

jwt:
  secret: ${JWT_SECRET:changeme_secret_key_needs_to_be_long_enough_for_hs256}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  upload-dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://sakuji.online}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}


logging:
  level:
    "[com.jlpt]": DEBUG
    "[org.springframework.security]": DEBUG
    "[org.hibernate.SQL]": WARN
