spring:
  application:
    name: jlpt-backend

  # Default profile uses H2 for dev (override with application-dev.yml)
  datasource:
    url: jdbc:h2:mem:jlptdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# JWT Configuration (override in production)
jwt:
  secret: jlpt-dev-secret-key-must-be-replaced-in-production-min-256-bits
  expiration-hours: 24
  refresh-expiration-hours: 168

# Upload configuration
upload:
  max-file-size: 10MB
  path: ./uploads

# AI configuration
ai:
  ocr:
    timeout-seconds: 30
    max-retries: 3
  speech:
    timeout-seconds: 30
    max-retries: 3

# Logging
logging:
  level:
    com.jlpt: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
