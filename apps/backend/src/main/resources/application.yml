spring:
  application:
    name: jlpt-backend

  # Default profile uses H2 for dev (override with application-dev.yml)
  datasource:
    url: jdbc:h2:mem:jlptdb;MODE=MSSQLServer
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

server:
  port: 8080

# JWT Configuration (override in production)
jwt:
  secret: jlpt-dev-secret-key-must-be-replaced-in-production-min-256-bits
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

# Upload configuration
upload:
  max-file-size: 10MB
  path: ./uploads

# AI configuration
ai:
  ocr:
    timeout-seconds: 30
    max-retries: 3
  speech:
    timeout-seconds: 30
    max-retries: 3

# Logging
logging:
  level:
    com.jlpt: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
