spring:
  application:
    name: jlpt-backend

  datasource:
    url: jdbc:sqlserver://127.0.0.1:1433;databaseName=JLPT_LearningDB;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: ${DATABASE_PASSWORD:changeme}

    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  h2:
    console:
      enabled: false

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:changeme-please-set-a-real-secret}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  frontend-url: http://localhost:3000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

google:
  client-id: ${GOOGLE_CLIENT_ID:placeholder-replace-with-real-client-id}
  client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-replace-with-real-client-secret}


logging:
  level:
    "[com.jlpt]": DEBUG
    "[org.springframework.security]": DEBUG
    "[org.hibernate.SQL]": WARN
