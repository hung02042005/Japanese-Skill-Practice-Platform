name: CD (Deploy to VPS)

on:
  push:
    branches: [ "branch_for_hung" ]

# Chỉ chạy CD khi CI thành công
# Nếu bạn không muốn đợi CI, có thể comment phần này lại
# needs: [backend-ci, frontend-ci] (Not strictly enforced across files unless configured, but good practice if combined)

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
    - name: Execute SSH commands on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e # Dừng ngay lập tức nếu có bất kỳ lệnh nào bị lỗi
          
          echo "Bắt đầu triển khai lên VPS..."
          
          # 1. Kiểm tra xem thư mục có tồn tại không
          if [ ! -d "${{ secrets.PROJECT_PATH }}" ]; then
            echo "LỖI NGHIÊM TRỌNG: Thư mục ${{ secrets.PROJECT_PATH }} không tồn tại trên VPS."
            echo "Vui lòng SSH vào VPS và chạy lệnh git clone dự án vào đường dẫn này."
            exit 1
          fi
          
          # Di chuyển tới thư mục chứa project
          cd ${{ secrets.PROJECT_PATH }}
          echo "Đang ở thư mục: $(pwd)"
          
          # 2. Lấy code mới nhất từ nhánh branch_for_hung
          echo "Đang tải code mới nhất từ nhánh branch_for_hung..."
          git checkout branch_for_hung
          git fetch origin branch_for_hung
          git reset --hard origin/branch_for_hung
          
          # 3. Kiểm tra file .env (BẮT BUỘC để chạy docker compose)
          if [ ! -f ".env" ]; then
            echo "LỖI NGHIÊM TRỌNG: Không tìm thấy file .env tại $(pwd)/.env"
            echo "Bạn phải tạo file .env trên VPS chứa biến MSSQL_SA_PASSWORD."
            exit 1
          fi
          
          # 4. Kiểm tra thư mục certbot-www (để tránh lỗi docker-compose.prod.yml)
          if [ ! -d "./certbot-www" ]; then
            echo "Đang tạo thư mục certbot-www..."
            mkdir -p ./certbot-www
          fi
          
          # Đảm bảo các quyền chạy script nếu cần
          # chmod +x apps/backend/mvnw
          
          # 5. Build lại các Docker image và chạy lại container ở chế độ background
          echo "Đang build và khởi động các Docker containers..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          
          # 6. Dọn dẹp các images lơ lửng (dangling) để tiết kiệm dung lượng
          echo "Đang dọn dẹp Docker images cũ..."
          docker image prune -f
          echo "Triển khai hoàn tất!"

    - name: Purge Cloudflare Cache
      run: |
        curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
             -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
             -H "Content-Type: application/json" \
             --data '{"purge_everything":true}'
