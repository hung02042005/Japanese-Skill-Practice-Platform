name: CD (Deploy to VPS)

# BUG-07 FIX: CD chỉ chạy SAU KHI workflow "CI (Build & Test)" (ci.yml) hoàn tất
# THÀNH CÔNG trên branch_for_hung. Trước đây cd.yml trigger trên cùng sự kiện
# push song song với ci.yml, không phụ thuộc nhau — code build/test lỗi vẫn
# được deploy thẳng lên production.
on:
  workflow_run:
    workflows: ["CI (Build & Test)"]
    branches: [ "branch_for_hung" ]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    # BUG-13 REVERT (2026-07-11): đã xoá `password:` một lần, nhưng CD run thực tế
    # fail ngay lập tức với "Error: can't connect without a private SSH key or
    # password" — nghĩa là secret VPS_SSH_KEY CHƯA từng được cấu hình trong repo,
    # và deploy trước giờ chỉ chạy được nhờ VPS_PASSWORD. Khôi phục lại password
    # làm fallback cho tới khi VPS_SSH_KEY được thiết lập và xác minh hoạt động,
    # rồi mới bỏ password lần nữa.
    - name: Execute SSH commands on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e # Dừng ngay lập tức nếu có bất kỳ lệnh nào bị lỗi
          
          echo "Bắt đầu triển khai lên VPS..."
          
          # 1. Kiểm tra xem thư mục có tồn tại không
          if [ ! -d "${{ secrets.PROJECT_PATH }}" ]; then
            echo "LỖI NGHIÊM TRỌNG: Thư mục ${{ secrets.PROJECT_PATH }} không tồn tại trên VPS."
            echo "Vui lòng SSH vào VPS và chạy lệnh git clone dự án vào đường dẫn này."
            exit 1
          fi
          
          # Di chuyển tới thư mục chứa project
          cd ${{ secrets.PROJECT_PATH }}
          echo "Đang ở thư mục: $(pwd)"
          
          # 2. Lấy code mới nhất từ nhánh branch_for_hung
          echo "Đang tải code mới nhất từ nhánh branch_for_hung..."
          git checkout branch_for_hung
          git fetch origin branch_for_hung
          git reset --hard origin/branch_for_hung
          
          # 3. Kiểm tra file .env (BẮT BUỘC để chạy docker compose)
          if [ ! -f ".env" ]; then
            echo "LỖI NGHIÊM TRỌNG: Không tìm thấy file .env tại $(pwd)/.env"
            echo "Bạn phải tạo file .env trên VPS chứa biến MSSQL_SA_PASSWORD."
            exit 1
          fi
          
          # 4. Kiểm tra thư mục certbot-www (để tránh lỗi docker-compose.prod.yml)
          if [ ! -d "./certbot-www" ]; then
            echo "Đang tạo thư mục certbot-www..."
            mkdir -p ./certbot-www
          fi
          
          # Đảm bảo các quyền chạy script nếu cần
          # chmod +x apps/backend/mvnw
          
          # 5. Khởi động DB và Redis trước
          echo "Đang khởi động Database và Redis..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d db redis
          
          # Đợi DB sẵn sàng và tạo Database JLPT_LearningDB (Fix triệt để lỗi crash-loop)
          echo "Đang chờ DB sẵn sàng và tạo cơ sở dữ liệu..."
          set -a
          source .env
          set +a
          MAX_RETRIES=30
          RETRY_COUNT=0
          until docker exec jlpt-db /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "IF NOT EXISTS(SELECT * FROM sys.databases WHERE name='JLPT_LearningDB') CREATE DATABASE JLPT_LearningDB"; do
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "LỖI: DB không sẵn sàng sau 150 giây."
              exit 1
            fi
            echo "DB chưa ready, thử lại sau 5 giây..."
            sleep 5
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          echo "Database JLPT_LearningDB đã sẵn sàng!"
          
          # 6. Build và khởi động các service còn lại (backend, frontend)
          echo "Đang build và khởi động Backend, Frontend..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend frontend

          # 7. POST-DEPLOY SMOKE TEST (P0.1 — xem Deploy_Improvement_Plan.md)
          # `docker compose up -d` chỉ đợi container được TẠO, không đợi ứng dụng
          # bên trong THỰC SỰ chạy được — đây chính là lý do sự cố backend
          # crash-loop ngày 11/07/2026 báo "deploy thành công" trên GitHub Actions
          # dù site trả 502 cho mọi request. Không được coi "container Started"
          # là đủ; phải tự gọi vào endpoint sức khoẻ và xác nhận trả về UP thật.
          echo "Đang xác minh backend thực sự sống (không chỉ container đã start)..."
          BACKEND_HEALTHY=0
          for i in $(seq 1 20); do
            if curl -sf -m 5 http://127.0.0.1:8080/actuator/health | grep -q '"status":"UP"'; then
              BACKEND_HEALTHY=1
              break
            fi
            echo "  backend chưa healthy, thử lại sau 5 giây (lần $i/20)..."
            sleep 5
          done
          if [ "$BACKEND_HEALTHY" -ne 1 ]; then
            echo "LỖI NGHIÊM TRỌNG: backend không lên healthy sau 100 giây. Log 100 dòng cuối:"
            docker logs jlpt-backend --tail 100
            exit 1
          fi
          echo "Backend xác nhận UP."

          echo "Đang xác minh frontend (Nginx) trả response..."
          FRONTEND_HEALTHY=0
          for i in $(seq 1 10); do
            if curl -sf -m 5 -o /dev/null http://127.0.0.1:80; then
              FRONTEND_HEALTHY=1
              break
            fi
            echo "  frontend chưa sẵn sàng, thử lại sau 3 giây (lần $i/10)..."
            sleep 3
          done
          if [ "$FRONTEND_HEALTHY" -ne 1 ]; then
            echo "LỖI NGHIÊM TRỌNG: frontend (Nginx) không phản hồi sau 30 giây. Log 50 dòng cuối:"
            docker logs jlpt-frontend --tail 50
            exit 1
          fi
          echo "Frontend xác nhận UP."

          # 8. Dọn dẹp các images lơ lửng (dangling) để tiết kiệm dung lượng
          echo "Đang dọn dẹp Docker images cũ..."
          docker image prune -f
          echo "Triển khai hoàn tất và đã xác minh backend + frontend đều sống!"

    - name: Purge Cloudflare Cache
      run: |
        curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
             -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
             -H "Content-Type: application/json" \
             --data '{"purge_everything":true}'
