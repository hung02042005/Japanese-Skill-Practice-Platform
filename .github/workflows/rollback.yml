name: Rollback Production (manual)

# P1.5 — xem docs/05-Deployment/Deploy_Improvement_Plan.md
#
# Trước bản này, "quay lại phiên bản trước" nghĩa là revert commit + chờ CI (~vài
# phút) + CD build lại từ đầu (thêm vài phút nữa). Vì cd.yml giờ gắn tag image
# theo commit SHA sau mỗi lần deploy thành công (bước 8 trong cd.yml), image cũ
# vẫn còn sẵn trên VPS — rollback chỉ cần đổi tag `latest` trỏ về image đó rồi
# khởi động lại container, KHÔNG build lại, nên chạy trong vài giây/chục giây.
#
# GIỚI HẠN QUAN TRỌNG: workflow này chỉ rollback ẢNH DOCKER (code backend/frontend
# đã build), KHÔNG rollback database schema hay các file cấu hình (docker-compose*.yml,
# .env) — nếu bản lỗi có kèm migration Flyway hoặc đổi biến môi trường bắt buộc,
# rollback image không thôi là không đủ, phải xử lý thủ công.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA muốn quay lại (phải là SHA của 1 lần deploy THÀNH CÔNG gần đây — xem deploy-history.log trên VPS hoặc lịch sử job 'Deploy to Production'). Dùng đủ 40 ký tự hoặc rút gọn 7 ký tự đều được, miễn còn image tag tương ứng trên VPS."
        required: true
        type: string

jobs:
  rollback:
    name: Rollback to previous image
    runs-on: ubuntu-latest

    steps:
    - name: Rollback via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          cd ${{ secrets.PROJECT_PATH }}

          TARGET_SHA="${{ inputs.sha }}"
          echo "Đang rollback về SHA: $TARGET_SHA"

          # 1. Xác nhận image tag này thực sự tồn tại trên VPS TRƯỚC khi làm gì —
          # tránh trường hợp gõ nhầm SHA rồi vô tình xoá/ghi đè image đang chạy tốt.
          BACKEND_IMG_ID=$(docker images -q "jlpt-backend:$TARGET_SHA")
          FRONTEND_IMG_ID=$(docker images -q "jlpt-frontend:$TARGET_SHA")
          if [ -z "$BACKEND_IMG_ID" ] || [ -z "$FRONTEND_IMG_ID" ]; then
            echo "LỖI: Không tìm thấy image jlpt-backend:$TARGET_SHA và/hoặc jlpt-frontend:$TARGET_SHA trên VPS."
            echo "Chỉ có thể rollback về 1 trong 5 SHA gần nhất còn được giữ lại (xem bước 8 trong cd.yml)."
            echo "Các SHA hiện có trên VPS:"
            docker images jlpt-backend --format '  {{.Tag}}  ({{.CreatedAt}})' | grep -v latest
            exit 1
          fi

          # 2. Đổi tag `latest` trỏ về đúng image SHA muốn rollback (không build lại).
          docker tag "jlpt-backend:$TARGET_SHA" jlpt-backend:latest
          docker tag "jlpt-frontend:$TARGET_SHA" jlpt-frontend:latest

          # 3. Khởi động lại container với image vừa retag — KHÔNG dùng --build,
          # để Docker Compose dùng đúng image đã tag ở bước 2 thay vì build mới.
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build backend frontend

          # 4. Smoke test — giống hệt nguyên tắc P0.1 trong cd.yml: "container Up"
          # không có nghĩa là "ứng dụng sống", kể cả khi rollback.
          echo "Đang xác minh backend sau rollback..."
          BACKEND_HEALTHY=0
          for i in $(seq 1 20); do
            if curl -sf -m 5 http://127.0.0.1:8080/actuator/health | grep -q '"status":"UP"'; then
              BACKEND_HEALTHY=1
              break
            fi
            sleep 5
          done
          if [ "$BACKEND_HEALTHY" -ne 1 ]; then
            echo "LỖI NGHIÊM TRỌNG: backend không healthy sau rollback. Log 100 dòng cuối:"
            docker logs jlpt-backend --tail 100
            exit 1
          fi

          FRONTEND_HEALTHY=0
          for i in $(seq 1 10); do
            if curl -sf -m 5 -o /dev/null http://127.0.0.1:80; then
              FRONTEND_HEALTHY=1
              break
            fi
            sleep 3
          done
          if [ "$FRONTEND_HEALTHY" -ne 1 ]; then
            echo "LỖI NGHIÊM TRỌNG: frontend không phản hồi sau rollback. Log 50 dòng cuối:"
            docker logs jlpt-frontend --tail 50
            exit 1
          fi

          echo "Rollback thành công về SHA $TARGET_SHA — backend + frontend đã xác nhận UP."
          echo "ROLLBACK $TARGET_SHA $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy-history.log

    - name: Purge Cloudflare Cache
      run: |
        curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
             -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
             -H "Content-Type: application/json" \
             --data '{"purge_everything":true}'
