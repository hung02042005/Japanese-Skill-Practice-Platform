name: CD Staging (Deploy to VPS)

# P1.4 — xem docs/05-Deployment/Deploy_Improvement_Plan.md
#
# Cùng nguyên tắc gate như cd.yml (BUG-07 fix): CHỈ deploy staging sau khi CI đã
# pass trên nhánh "develop" — ci.yml đã sẵn trigger cho nhánh này (branches: main,
# develop, branch_for_hung).
on:
  workflow_run:
    workflows: ["CI (Build & Test)"]
    branches: [ "develop" ]
    types: [completed]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Execute SSH commands on VPS (staging)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          echo "Bắt đầu triển khai STAGING lên VPS..."

          PROD_PATH="${{ secrets.PROJECT_PATH }}"
          STAGING_PATH="${PROD_PATH}-staging"

          # 1. Thư mục staging là 1 checkout git RIÊNG (không dùng chung working
          # directory với production) — để `git reset --hard` của staging không
          # bao giờ có thể ảnh hưởng tới code đang chạy thật. Lấy URL remote từ
          # chính checkout production đã tồn tại sẵn, tránh phải thêm 1 secret mới.
          if [ ! -d "$STAGING_PATH/.git" ]; then
            echo "Chưa có checkout staging, đang clone lần đầu vào $STAGING_PATH..."
            REPO_URL=$(git -C "$PROD_PATH" remote get-url origin)
            git clone "$REPO_URL" "$STAGING_PATH"
          fi

          cd "$STAGING_PATH"
          echo "Đang ở thư mục: $(pwd)"

          # 2. Đồng bộ code từ nhánh develop
          git fetch origin develop
          git checkout develop
          git reset --hard origin/develop

          # 3. Dùng CHUNG bộ secret với production (cùng .env gốc) — xem
          # docs/05-Deployment/SECRETS.md, mục 2. Copy lại mỗi lần deploy để
          # staging luôn khớp giá trị mới nhất production đang dùng.
          if [ ! -f "$PROD_PATH/.env" ]; then
            echo "LỖI NGHIÊM TRỌNG: Không tìm thấy $PROD_PATH/.env — deploy production phải chạy ít nhất 1 lần trước khi có staging."
            exit 1
          fi
          cp -f "$PROD_PATH/.env" "$STAGING_PATH/.env"

          # 4. Khởi động db-staging + redis-staging trước, chờ DB nhận kết nối
          echo "Đang khởi động Database + Redis (staging)..."
          docker compose -f docker-compose.staging.yml up -d db-staging redis-staging

          set -a
          source .env
          set +a
          MAX_RETRIES=30
          RETRY_COUNT=0
          until docker exec jlpt-db-staging mysqladmin ping -h 127.0.0.1 -u root -p"${MYSQL_ROOT_PASSWORD:-$MYSQL_PASSWORD}" --silent; do
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "LỖI: DB staging không sẵn sàng sau 150 giây."
              exit 1
            fi
            echo "DB staging chưa ready, thử lại sau 5 giây..."
            sleep 5
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          echo "Database staging MySQL đã sẵn sàng!"

          # 5. Build và khởi động backend (service key "backend" — xem comment
          # trong docker-compose.staging.yml lý do không đổi thành "backend-staging")
          # + frontend-staging
          echo "Đang build và khởi động Backend, Frontend (staging)..."
          docker compose -f docker-compose.staging.yml up -d --build backend frontend-staging

          # 6. Smoke test — cùng nguyên tắc P0.1: container Up không có nghĩa app sống.
          echo "Đang xác minh backend staging thực sự sống..."
          BACKEND_HEALTHY=0
          for i in $(seq 1 20); do
            if curl -sf -m 5 http://127.0.0.1:8081/actuator/health | grep -q '"status":"UP"'; then
              BACKEND_HEALTHY=1
              break
            fi
            sleep 5
          done
          if [ "$BACKEND_HEALTHY" -ne 1 ]; then
            echo "LỖI: backend staging không healthy sau 100s. Log 100 dòng cuối:"
            docker logs jlpt-backend-staging --tail 100
            exit 1
          fi
          echo "Backend staging xác nhận UP."

          FRONTEND_HEALTHY=0
          for i in $(seq 1 10); do
            if curl -sf -m 5 -o /dev/null http://127.0.0.1:8082; then
              FRONTEND_HEALTHY=1
              break
            fi
            sleep 3
          done
          if [ "$FRONTEND_HEALTHY" -ne 1 ]; then
            echo "LỖI: frontend staging không phản hồi sau 30s. Log 50 dòng cuối:"
            docker logs jlpt-frontend-staging --tail 50
            exit 1
          fi
          echo "Frontend staging xác nhận UP."

          docker image prune -f
          echo "Deploy STAGING hoàn tất — http://135.149.56.179:8082"
