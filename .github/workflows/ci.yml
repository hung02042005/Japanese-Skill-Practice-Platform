name: CI (Build & Test)

on:
  push:
    branches: [ "main", "develop", "branch_for_hung" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend CI (Java 21)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./apps/backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: mvn -B clean verify
      env:
        # Provide fallback env vars so tests don't fail due to missing variables
        DATABASE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
        DATABASE_USERNAME: sa
        DATABASE_PASSWORD: ""
        JWT_SECRET: super_secret_test_key_must_be_long_enough
        JWT_ACCESS_EXPIRATION_MS: 900000
        JWT_REFRESH_EXPIRATION_MS: 604800000

  frontend-ci:
    name: Frontend CI (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./apps/frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint
      run: npm run lint
      
    - name: Build
      run: npm run build
      
    # If the user has tests, uncomment this step later
    # - name: Test
    #   run: npm run test
